version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: sprintboard-db
    environment:
      POSTGRES_DB: sprintboard
      POSTGRES_USER: sprintuser
      POSTGRES_PASSWORD: sprintpass
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: sprintboard-backend
    env_file:
      - ./backend/.env
    ports:
      - "4000:4000"
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: sprintboard-frontend
    environment:
      - VITE_API_URL=http://localhost:4000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  db_data:

